# docker-compose.yml — Production deployment
# =============================================
# Usage:
#   cp .env.example .env        # configure your environment
#   docker compose up -d        # start all services
#   docker compose down         # stop all services
#   docker compose down -v      # stop + remove volumes (⚠️ data loss)
#
# Override for production:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Services:
#   - sqlflow:    SQLFlow application (Go + embedded React SPA)
#   - mysql:      MySQL 8.0 database for query execution
#
# Includes:
#   - Health checks on all services
#   - Named volumes for data persistence
#   - Resource limits (CPU/memory)
#   - Restart policies
#   - Dependency ordering

services:
  # ----- Application -----
  sqlflow:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${SQLFLOW_VERSION:-latest}
        BUILD_TIME: ${BUILD_TIME:-}
    image: sqlflow:${SQLFLOW_VERSION:-latest}
    container_name: sqlflow-app
    ports:
      - "${SQLFLOW_SERVER_PORT:-8080}:8080"
      - "${SQLFLOW_METRICS_PORT:-9090}:9090"
    volumes:
      - sqlflow-data:/app/data
      # Optional: mount TLS certificates
      # - ./certs/sqlflow.crt:/etc/ssl/certs/sqlflow.crt:ro
      # - ./certs/sqlflow.key:/etc/ssl/private/sqlflow.key:ro
    environment:
      # Server
      SQLFLOW_SERVER_PORT: "8080"
      # JWT authentication
      SQLFLOW_JWT_SECRET: ${SQLFLOW_JWT_SECRET:?SQLFLOW_JWT_SECRET is required}
      SQLFLOW_JWT_EXPIRY: ${SQLFLOW_JWT_EXPIRY:-24h}
      # Admin account (set via env, not config file)
      SQLFLOW_ADMIN_USERNAME: ${SQLFLOW_ADMIN_USERNAME:-admin}
      SQLFLOW_ADMIN_PASSWORD: ${SQLFLOW_ADMIN_PASSWORD:-}
      # SQLite database path (inside container volume)
      SQLFLOW_DB_PATH: /app/data/sqlflow.db
      # Encryption key for sensitive data
      SQLFLOW_ENCRYPTION_KEY: ${SQLFLOW_ENCRYPTION_KEY:-}
      # AI review provider
      SQLFLOW_AI_PROVIDER: ${SQLFLOW_AI_PROVIDER:-openai}
      SQLFLOW_AI_MODEL: ${SQLFLOW_AI_MODEL:-gpt-4}
      SQLFLOW_AI_API_KEY: ${SQLFLOW_AI_API_KEY:-}
      SQLFLOW_AI_BASE_URL: ${SQLFLOW_AI_BASE_URL:-https://api.openai.com/v1}
      # DingTalk notifications (optional)
      SQLFLOW_DINGTALK_WEBHOOK_URL: ${SQLFLOW_DINGTALK_WEBHOOK_URL:-}
      SQLFLOW_DINGTALK_SECRET: ${SQLFLOW_DINGTALK_SECRET:-}
      # TLS (disabled by default, enable for production HTTPS)
      SQLFLOW_SERVER_TLS_ENABLE: ${SQLFLOW_SERVER_TLS_ENABLE:-false}
      SQLFLOW_SERVER_TLS_CERT_FILE: ${SQLFLOW_SERVER_TLS_CERT_FILE:-}
      SQLFLOW_SERVER_TLS_KEY_FILE: ${SQLFLOW_SERVER_TLS_KEY_FILE:-}
      SQLFLOW_SERVER_TLS_REDIRECT_HTTP: ${SQLFLOW_SERVER_TLS_REDIRECT_HTTP:-false}
      SQLFLOW_SERVER_TLS_HTTP_PORT: ${SQLFLOW_SERVER_TLS_HTTP_PORT:-80}
      # Prometheus metrics
      SQLFLOW_METRICS_ENABLED: ${SQLFLOW_METRICS_ENABLED:-false}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    networks:
      - sqlflow-net

  # ----- Database -----
  mysql:
    image: mysql:8.0
    container_name: sqlflow-mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      # Optional: custom MySQL configuration
      # - ./config/mysql.cnf:/etc/mysql/conf.d/custom.cnf:ro
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sqlflow}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    networks:
      - sqlflow-net

# ----- Named Volumes (persistent data) -----
volumes:
  sqlflow-data:
    name: sqlflow-app-data
    driver: local
  mysql-data:
    name: sqlflow-mysql-data
    driver: local

# ----- Networks -----
networks:
  sqlflow-net:
    name: sqlflow-net
    driver: bridge
