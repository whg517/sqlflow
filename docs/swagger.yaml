basePath: /api
definitions:
  handler.addPolicyRequest:
    properties:
      act:
        type: string
      dom:
        type: string
      obj:
        type: string
      sub:
        type: string
    type: object
  handler.approveTicketRequest:
    properties:
      comment:
        type: string
    type: object
  handler.cancelTicketRequest:
    properties:
      reason:
        type: string
    type: object
  handler.changePasswordRequest:
    properties:
      new_password:
        type: string
      old_password:
        type: string
    type: object
  handler.createCommentRequest:
    properties:
      content:
        type: string
      parent_id:
        type: integer
    type: object
  handler.createDatasourceRequest:
    properties:
      database:
        type: string
      host:
        type: string
      max_idle:
        type: integer
      max_idle_time:
        type: integer
      max_lifetime:
        type: integer
      max_open:
        type: integer
      name:
        type: string
      password:
        type: string
      port:
        type: integer
      type:
        type: string
      username:
        type: string
    type: object
  handler.createMaskRuleRequest:
    properties:
      custom_regex:
        type: string
      custom_template:
        type: string
      database:
        type: string
      datasource_id:
        type: integer
      field:
        type: string
      mask_type:
        type: string
      table_name:
        type: string
    type: object
  handler.createSensitiveTableRequest:
    properties:
      database:
        type: string
      datasource_id:
        type: integer
      sensitivity_level:
        type: string
      table_name:
        type: string
    type: object
  handler.createTicketRequest:
    properties:
      ai_review_result:
        type: string
      change_reason:
        type: string
      database:
        type: string
      datasource_id:
        type: integer
      db_type:
        type: string
      risk_level:
        type: string
      sql:
        type: string
    type: object
  handler.createUserRequest:
    properties:
      password:
        type: string
      role:
        type: string
      username:
        type: string
    type: object
  handler.datasourceResponse:
    properties:
      created_at:
        type: string
      database:
        type: string
      host:
        type: string
      id:
        type: integer
      max_idle:
        type: integer
      max_idle_time:
        type: integer
      max_lifetime:
        type: integer
      max_open:
        type: integer
      name:
        type: string
      port:
        type: integer
      status:
        type: string
      type:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  handler.executeQueryRequest:
    properties:
      database:
        type: string
      datasource_id:
        type: integer
      sql:
        type: string
    type: object
  handler.exportQueryRequest:
    properties:
      database:
        type: string
      datasource_id:
        type: integer
      format:
        description: '"csv" or "json"'
        type: string
      sql:
        type: string
    type: object
  handler.loginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  handler.loginResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
      token_type:
        type: string
      user:
        $ref: '#/definitions/handler.userResponse'
    type: object
  handler.refreshRequest:
    properties:
      refresh_token:
        type: string
    type: object
  handler.rejectTicketRequest:
    properties:
      reason:
        type: string
    type: object
  handler.resetPasswordRequest:
    properties:
      password:
        type: string
    type: object
  handler.reviewRequest:
    properties:
      database:
        type: string
      datasource_id:
        type: integer
      sql:
        type: string
    type: object
  handler.scheduleTicketRequest:
    properties:
      scheduled_at:
        description: RFC3339 format
        type: string
    type: object
  handler.updateAIConfigRequest:
    properties:
      api_key:
        type: string
      base_url:
        type: string
      model:
        type: string
      provider:
        type: string
      timeout:
        type: string
    type: object
  handler.updateDatasourceRequest:
    properties:
      database:
        type: string
      host:
        type: string
      max_idle:
        type: integer
      max_idle_time:
        type: integer
      max_lifetime:
        type: integer
      max_open:
        type: integer
      name:
        type: string
      password:
        type: string
      port:
        type: integer
      type:
        type: string
      username:
        type: string
    type: object
  handler.updateMaskRuleRequest:
    properties:
      custom_regex:
        type: string
      custom_template:
        type: string
      field:
        type: string
      mask_type:
        type: string
      table_name:
        type: string
    type: object
  handler.updateNotifyConfigRequest:
    properties:
      secret:
        type: string
      webhook_url:
        type: string
    type: object
  handler.updateUserRequest:
    properties:
      role:
        type: string
    type: object
  handler.userDetailResponse:
    properties:
      created_at:
        type: string
      id:
        type: integer
      role:
        type: string
      username:
        type: string
    type: object
  handler.userListResponse:
    properties:
      total:
        type: integer
      users:
        items:
          $ref: '#/definitions/handler.userDetailResponse'
        type: array
    type: object
  handler.userResponse:
    properties:
      id:
        type: integer
      role:
        type: string
      username:
        type: string
    type: object
  resp.ErrorResponse:
    properties:
      code:
        type: integer
      message:
        type: string
    type: object
  resp.PageResponse:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  resp.SuccessResponse:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  service.DashboardStats:
    properties:
      active_datasources:
        type: integer
      pending_tickets:
        type: integer
      recent_queries_7d:
        type: integer
      total_users:
        type: integer
    type: object
  service.Policy:
    properties:
      act:
        type: string
      dom:
        type: string
      id:
        type: integer
      obj:
        type: string
      ptype:
        type: string
      sub:
        type: string
    type: object
  service.QueryResult:
    properties:
      affected_rows:
        type: integer
      columns:
        items:
          type: string
        type: array
      desensitized:
        type: boolean
      desensitized_fields:
        items:
          type: string
        type: array
      execution_time_ms:
        type: integer
      rows:
        items:
          additionalProperties: true
          type: object
        type: array
      total:
        type: integer
      warnings:
        items:
          type: string
        type: array
    type: object
  service.RoleInfo:
    properties:
      name:
        type: string
      policies:
        items:
          $ref: '#/definitions/service.Policy'
        type: array
    type: object
host: localhost:8080
info:
  contact: {}
  description: SQL 审核、查询和工单管理平台 API
  title: SQLFlow API
  version: "1.0"
paths:
  /audit-logs:
    get:
      description: 获取审计日志列表，支持分页和筛选
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 50
        description: 每页数量
        in: query
        name: page_size
        type: integer
      - description: 用户ID
        in: query
        name: user_id
        type: string
      - description: 操作类型
        in: query
        name: action
        type: string
      - description: 数据源ID
        in: query
        name: datasource_id
        type: string
      - description: 开始时间
        in: query
        name: start
        type: string
      - description: 结束时间
        in: query
        name: end
        type: string
      - description: 搜索关键词
        in: query
        name: keyword
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/resp.PageResponse'
        "500":
          description: 获取审计日志失败
          schema:
            $ref: '#/definitions/resp.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取审计日志列表
      tags:
      - 审计
  /audit-logs/search:
    get:
      description: 使用FTS5全文搜索审计日志
      parameters:
      - description: 搜索关键词
        in: query
        name: keyword
        required: true
        type: string
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 50
        description: 每页数量
        in: query
        name: page_size
        type: integer
      - description: 用户ID
        in: query
        name: user_id
        type: string
      - description: 操作类型
        in: query
        name: action
        type: string
      - description: 开始时间
        in: query
        name: start
        type: string
      - description: 结束时间
        in: query
        name: end
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/resp.PageResponse'
        "400":
          description: keyword 参数必填
          schema:
            $ref: '#/definitions/resp.ErrorResponse'
        "500":
          description: 搜索失败
          schema:
            $ref: '#/definitions/resp.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 全文搜索审计日志
      tags:
      - 审计
  /auth/login:
    post:
      consumes:
      - application/json
      description: 使用用户名和密码登录，返回 JWT token
      parameters:
      - description: 登录信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功
          schema:
            allOf:
            - $ref: '#/definitions/resp.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/handler.loginResponse'
              type: object
        "400":
          description: 请求格式错误
          schema:
            $ref: '#/definitions/resp.ErrorResponse'
        "401":
          description: 用户名或密码错误
          schema:
            $ref: '#/definitions/resp.ErrorResponse'
      summary: 用户登录
      tags:
      - 认证
  /auth/me:
    get:
      description: 获取当前登录用户的详细信息
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            allOf:
            - $ref: '#/definitions/resp.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/handler.userDetailResponse'
              type: object
        "401":
          description: 未认证
          schema:
            $ref: '#/definitions/resp.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取当前用户信息
      tags:
      - 认证
  /auth/password:
    put:
      consumes:
      - application/json
      description: 修改当前用户密码
      parameters:
      - description: 修改密码请求
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.changePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 密码修改成功
          schema:
            $ref: '#/definitions/resp.SuccessResponse'
        "400":
          description: 请求格式错误
          schema:
            $ref: '#/definitions/resp.ErrorResponse'
        "401":
          description: 旧密码错误
          schema:
            $ref: '#/definitions/resp.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 修改密码
      tags:
      - 认证
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: 使用 refresh_token 获取新的 access_token
      parameters:
      - description: 刷新Token请求
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.refreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 刷新成功
          schema:
            allOf:
            - $ref: '#/definitions/resp.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/handler.loginResponse'
              type: object
        "400":
          description: 请求格式错误
          schema:
            $ref: '#/definitions/resp.ErrorResponse'
        "401":
          description: refresh_token 无效或已过期
          schema:
            $ref: '#/definitions/resp.ErrorResponse'
      summary: 刷新Token
      tags:
      - 认证
  /backups:
    get:
      description: 管理员获取所有备份文件列表
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/resp.SuccessResponse'
        "500":
          description: 获取备份列表失败
          schema:
            $ref: '#/definitions/resp.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取备份列表
      tags:
      - 备份
    post:
      description: 管理员手动触发一次数据库备份
      produces:
      - application/json
      responses:
        "200":
          description: 备份已创建
          schema:
            $ref: '#/definitions/resp.SuccessResponse'
        "500":
          description: 备份失败
          schema:
            $ref: '#/definitions/resp.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 手动触发备份
      tags:
      - 备份
  /backups/{filename}:
    delete:
      description: 管理员删除指定的备份文件
      parameters:
      - description: 备份文件名
        in: path
        name: filename
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 备份已删除
          schema:
            $ref: '#/definitions/resp.SuccessResponse'
        "400":
          description: 缺少备份文件名
          schema:
            $ref: '#/definitions/resp.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 删除备份
      tags:
      - 备份
  /backups/{filename}/download:
    get:
      description: 管理员下载指定的备份文件
      parameters:
      - description: 备份文件名
        in: path
        name: filename
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: 备份文件
          schema:
            type: file
        "400":
          description: 缺少备份文件名
          schema:
            $ref: '#/definitions/resp.ErrorResponse'
        "404":
          description: 备份文件不存在
          schema:
            $ref: '#/definitions/resp.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 下载备份
      tags:
      - 备份
  /comments/{id}:
    delete:
      description: 删除指定的评论（仅作者或管理员可操作）
      parameters:
      - description: 评论ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 评论已删除
          schema:
            $ref: '#/definitions/resp.SuccessResponse'
        "400":
          description: 无效的评论ID
          schema:
            $ref: '#/definitions/resp.ErrorResponse'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/resp.ErrorResponse'
        "404":
          description: 评论不存在
          schema:
            $ref: '#/definitions/resp.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 删除评论
      tags:
      - 评论
  /dashboard/stats:
    get:
      description: 获取待处理工单数、近7天查询数、活跃数据源数、总用户数等统计信息
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            allOf:
            - $ref: '#/definitions/resp.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/service.DashboardStats'
              type: object
        "500":
          description: 获取统计数据失败
          schema:
            $ref: '#/definitions/resp.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取仪表盘统计
      tags:
      - 仪表盘
  /datasources:
    get:
      description: 管理员获取所有数据源列表
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            allOf:
            - $ref: '#/definitions/resp.SuccessResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/handler.datasourceResponse'
                  type: array
              type: object
        "500":
          description: 获取数据源列表失败
          schema:
            $ref: '#/definitions/resp.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取数据源列表
      tags:
      - 数据源
    post:
      consumes:
      - application/json
      description: 管理员创建新的数据源连接
      parameters:
      - description: 创建数据源请求
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.createDatasourceRequest'
      produces:
      - application/json
      responses:
        "201":
          description: 创建成功
          schema:
            allOf:
            - $ref: '#/definitions/resp.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/handler.datasourceResponse'
              type: object
        "400":
          description: 请求格式错误
          schema:
            $ref: '#/definitions/resp.ErrorResponse'
        "500":
          description: 创建数据源失败
          schema:
            $ref: '#/definitions/resp.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 创建数据源
      tags:
      - 数据源
  /datasources/{id}:
    delete:
      description: 管理员禁用指定数据源
      parameters:
      - description: 数据源ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 数据源已禁用
          schema:
            $ref: '#/definitions/resp.SuccessResponse'
        "400":
          description: 无效的数据源ID
          schema:
            $ref: '#/definitions/resp.ErrorResponse'
        "404":
          description: 数据源不存在
          schema:
            $ref: '#/definitions/resp.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 禁用数据源
      tags:
      - 数据源
    get:
      description: 管理员获取指定数据源详细信息
      parameters:
      - description: 数据源ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            allOf:
            - $ref: '#/definitions/resp.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/handler.datasourceResponse'
              type: object
        "400":
          description: 无效的数据源ID
          schema:
            $ref: '#/definitions/resp.ErrorResponse'
        "404":
          description: 数据源不存在
          schema:
            $ref: '#/definitions/resp.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取数据源详情
      tags:
      - 数据源
    put:
      consumes:
      - application/json
      description: 管理员更新指定数据源配置
      parameters:
      - description: 数据源ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新数据源请求
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.updateDatasourceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            allOf:
            - $ref: '#/definitions/resp.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/handler.datasourceResponse'
              type: object
        "400":
          description: 请求格式错误
          schema:
            $ref: '#/definitions/resp.ErrorResponse'
        "404":
          description: 数据源不存在
          schema:
            $ref: '#/definitions/resp.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 更新数据源
      tags:
      - 数据源
  /datasources/{id}/tables:
    get:
      description: 获取指定数据源中的所有表列表
      parameters:
      - description: 数据源ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/resp.SuccessResponse'
        "400":
          description: 无效的数据源ID
          schema:
            $ref: '#/definitions/resp.ErrorResponse'
        "404":
          description: 数据源不存在
          schema:
            $ref: '#/definitions/resp.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取表列表
      tags:
      - 数据源
  /datasources/{id}/tables/{name}/columns:
    get:
      description: 获取指定数据源中指定表的字段列表
      parameters:
      - description: 数据源ID
        in: path
        name: id
        required: true
        type: integer
      - description: 表名
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/resp.SuccessResponse'
        "400":
          description: 无效的数据源ID或表名
          schema:
            $ref: '#/definitions/resp.ErrorResponse'
        "404":
          description: 数据源不存在
          schema:
            $ref: '#/definitions/resp.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取表字段列表
      tags:
      - 数据源
  /datasources/{id}/test:
    post:
      description: 管理员测试指定数据源的连接状态
      parameters:
      - description: 数据源ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 测试结果
          schema:
            allOf:
            - $ref: '#/definitions/resp.SuccessResponse'
            - properties:
                data:
                  additionalProperties: true
                  type: object
              type: object
        "400":
