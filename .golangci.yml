version: "2"
run:
  modules-download-mode: readonly
linters:
  enable:
    - misspell
  settings:
    errcheck:
      check-type-assertions: true
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
        - fmt.Println
        - fmt.Print
        - fmt.Sprintf
    govet:
      enable-all: true
    misspell:
      locale: US
      ignore-rules:
        - sqlflow
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: _test.go
        linters:
          - errcheck
    paths:
      - testdata
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
severity:
  default: warning
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
