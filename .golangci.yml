# =============================================================================
# SQLFlow — golangci-lint v2 configuration
# =============================================================================
# Conservative baseline: only catch real bugs, not style/formatting.
# Strict linters (errcheck, govet enable-all) to be enabled gradually
# as code quality improves. Track in separate requirements.
# =============================================================================

version: "2"

run:
  modules-download-mode: readonly

linters:
  default: standard
  disable:
    - errcheck
    - unused
  enable:
    - misspell
  settings:
    govet:
      # Only core checks, not fieldalignment/shadow
      enable:
        - atomicalign
        - buildtag
        - copylocks
        - httpresponse
        - loopclosure
        - printf
        - shift
        - stdmethods
        - structtag
        - tests
        - unmarshal
        - unreachable
    misspell:
      locale: US
      ignore-rules:
        - sqlflow
        - cancelled
        - Cancelled
        - CANCELLED
    staticcheck:
      checks:
        - all
        - -QF1008  # requires database field restructuring (9 files)
        - -ST1005  # error strings start with Chinese brand names (Elasticsearch, SQL)
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: _test.go
        linters:
          - errcheck
          - unused
    paths:
      - testdata
      - third_party$
      - builtin$
      - examples$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

severity:
  default: warning

formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
