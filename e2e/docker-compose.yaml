# e2e/docker-compose.yaml — E2E test isolated environment
#
# Independent of main docker-compose.yaml. No overlay.
# All services communicate via the internal e2e-net bridge network.
#
# Usage:
#   cd e2e && docker compose up -d --build --wait   # Start environment
#   cd e2e && docker compose down -v                  # Tear down + clean volumes
#
# Local port conflicts? Create .env.e2e.local:
#   SQLFLOW_E2E_PORT=18080
#   MYSQL_E2E_PORT=13307

services:
  # ── Test MySQL ──────────────────────────────────────────
  mysql-test:
    image: mysql:8.0
    container_name: sqlflow-e2e-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-e2e-root-pass-123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-testdb}
    ports:
      - "${MYSQL_E2E_PORT:-13307}:3306"
    volumes:
      - mysql-e2e-data:/var/lib/mysql
      - ./seed/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - e2e-net

  # ── SQLFlow Backend (Go embed frontend) ─────────────────
  sqlflow:
    build:
      context: ..
      dockerfile: Dockerfile
    image: sqlflow-e2e:latest
    container_name: sqlflow-e2e-app
    depends_on:
      mysql-test:
        condition: service_healthy
    ports:
      - "${SQLFLOW_E2E_PORT:-18080}:8080"
    environment:
      SQLFLOW_SERVER_PORT: 8080
      SQLFLOW_DB_PATH: /app/data/sqlflow.db
      SQLFLOW_JWT_SECRET: ${SQLFLOW_JWT_SECRET:-e2e-jwt-secret-for-testing-only}
      SQLFLOW_JWT_EXPIRY: 24h
      SQLFLOW_ENCRYPTION_KEY: ${SQLFLOW_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
      SQLFLOW_ADMIN_USERNAME: ${SQLFLOW_E2E_ADMIN:-e2eadmin}
      SQLFLOW_ADMIN_PASSWORD: ${SQLFLOW_E2E_ADMIN_PASSWORD:-e2e-test-pass-123}
      SQLFLOW_METRICS_ENABLED: "false"
    volumes:
      - sqlflow-e2e-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    networks:
      - e2e-net

  # ── E2E Test Runner (Playwright) ────────────────────────
  e2e-runner:
    image: mcr.microsoft.com/playwright:v1.59.1-noble
    container_name: sqlflow-e2e-runner
    working_dir: /app
    depends_on:
      sqlflow:
        condition: service_healthy
    environment:
      E2E_BASE_URL: http://sqlflow:8080
      E2E_MYSQL_HOST: mysql-test
      E2E_MYSQL_PORT: 3306
      E2E_MYSQL_USER: root
      E2E_MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-e2e-root-pass-123}
      E2E_USERNAME: ${SQLFLOW_E2E_ADMIN:-e2eadmin}
      E2E_PASSWORD: ${SQLFLOW_E2E_ADMIN_PASSWORD:-e2e-test-pass-123}
      CI: "true"
    volumes:
      - ./:/app
      - /app/node_modules  # anonymous volume to prevent overwriting container node_modules
    entrypoint: ["sh", "-c"]
    command:
      - |
        npm ci
        npx playwright test --project=real
    networks:
      - e2e-net

volumes:
  mysql-e2e-data:
  sqlflow-e2e-data:

networks:
  e2e-net:
    driver: bridge
