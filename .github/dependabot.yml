# Dependabot 配置 — 自动更新依赖
version: 2

updates:
  # ── Go 模块依赖 ──
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    reviewers:
      - "whg517"
    labels:
      - "dependencies"
      - "go"
    commit-message:
      prefix: "deps(go)"
      prefix-development: "deps(go-dev)"

  # ── npm 依赖（前端） ──
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    reviewers:
      - "whg517"
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "deps(npm)"
      prefix-development: "deps(npm-dev)"
    # 忽略次要版本更新（只更新补丁版本和安全更新）
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-minor"]

  # ── GitHub Actions ──
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 3
    reviewers:
      - "whg517"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "deps(actions)"
