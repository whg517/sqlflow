# ============================================================
# SQLFlow Release — v* tag 触发
# 1. 编译多平台二进制（linux/amd64, linux/arm64, darwin/amd64）
# 2. 构建 Docker 镜像并推送
# 3. 创建 GitHub Release
# ============================================================
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "24"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ────────────────────────────────────────────────
  # 编译多平台二进制
  # ────────────────────────────────────────────────
  build-binaries:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: sqlflow-linux-amd64
          - goos: linux
            goarch: arm64
            artifact: sqlflow-linux-arm64
          - goos: darwin
            goarch: amd64
            artifact: sqlflow-darwin-amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install & lint & type-check frontend
        run: cd web && npm ci && npm run lint && npx tsc -b --noEmit

      - name: Build frontend
        run: cd web && npm run build

      - name: Build Go binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BUILD_TIME="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          go build \
            -ldflags="-s -w -X main.version=${VERSION} -X main.buildTime=${BUILD_TIME}" \
            -o "${{ matrix.artifact }}" \
            ./cmd/server/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 90

  # ────────────────────────────────────────────────
  # 构建并推送 Docker 镜像（多平台）
  # ────────────────────────────────────────────────
  build-docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !contains(github.ref_name, '-') }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}

  # ────────────────────────────────────────────────
  # 创建 GitHub Release（含二进制产物）
  # ────────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-docker]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1 || echo "")

          cat > release_notes.md <<EOF
          ## What's Changed

          EOF

          if [ -n "$PREV_TAG" ]; then
            echo "### Commits since \`${PREV_TAG}\`" >> release_notes.md
            echo "" >> release_notes.md
            git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s (%h)" --no-merges >> release_notes.md
          else
            echo "Initial release of SQLFlow." >> release_notes.md
          fi

          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Docker Image" >> release_notes.md
          echo '```bash' >> release_notes.md
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}" >> release_notes.md
          echo '```' >> release_notes.md

      - name: Package artifacts
        run: |
          cd ./artifacts
          for f in sqlflow-linux-*; do
            [ -f "$f" ] && tar -czf "${f}.tar.gz" "$f"
          done
          for f in sqlflow-darwin-*; do
            [ -f "$f" ] && tar -czf "${f}.tar.gz" "$f"
          done

      - name: Generate checksums
        run: |
          cd ./artifacts
          sha256sum *.tar.gz > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: |
            ./artifacts/*.tar.gz
            ./artifacts/checksums-sha256.txt
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
