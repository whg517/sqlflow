# ============================================================
# SQLFlow CD — main 合并后自动构建推送 Docker 镜像并部署
# 触发条件：push 到 main（CI 全部通过后）
# 流水线：Docker Build → Push GHCR → SSH Deploy
# ============================================================
name: CD

on:
  push:
    branches: [main]
  # 允许手动触发（如回滚或重建）
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push image to registry"
        required: false
        default: "true"
      deploy:
        description: "Deploy to server after push"
        required: false
        default: "true"

# 仅 main 分支推送时自动执行
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ────────────────────────────────────────────────
  # 构建并推送 Docker 镜像
  # ────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # ── 多架构支持 ──
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 登录 GHCR ──
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 提取 Docker metadata（标签策略） ──
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # 每次 main 推送生成 sha 短标签
            type=sha,prefix=
            # main 分支始终指向最新
            type=raw,value=latest,enable={{is_default_branch}}
            # 语义化版本标签（当有 git tag 时）
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # ── 构建并推送 ──
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event.inputs.push_image == 'true' }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}

      # ── 生成构建摘要 ──
      - name: Build Summary
        if: success()
        run: |
          echo "## Docker Image Published :whale:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.meta.outputs.tags }}' | tr ',' '\n' | while read tag; do
            echo "- \`${tag}\`" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY

      # ── 输出镜像 digest 供后续 job 使用 ──
      - name: Export image digest
        if: success()
        run: echo "digest=${{ steps.build.outputs.digest }}" >> $GITHUB_OUTPUT
        id: digest

  # ────────────────────────────────────────────────
  # 部署到生产服务器
  # ────────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event.inputs.deploy == 'true'
    environment:
      name: production
      url: ${{ vars.DEPLOY_URL || 'http://localhost:8080' }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract Docker metadata for image tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=

      # ── SSH 部署 ──
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail

            echo "=== Deploying SQLFlow ==="
            echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}"
            echo "Time:  $(date -u '+%Y-%m-%dT%H:%M:%SZ')"

            # 登录 GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

            # 拉取最新镜像
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}

            # 如果使用 docker-compose
            if [ -f docker-compose.yml ]; then
              cd /opt/sqlflow 2>/dev/null || mkdir -p /opt/sqlflow && cd /opt/sqlflow

              # 备份当前镜像 tag
              CURRENT_TAG=$(docker compose images -q sqlflow 2>/dev/null || echo "")

              # 更新镜像 tag
              export IMAGE_TAG=${{ steps.meta.outputs.version }}
              docker compose up -d --pull never sqlflow

              # 等待健康检查通过
              echo "Waiting for health check..."
              for i in $(seq 1 30); do
                if curl -sf http://localhost:8080/api/health > /dev/null 2>&1; then
                  echo "Health check passed!"
                  break
                fi
                if [ "$i" -eq 30 ]; then
                  echo "::error::Health check failed after 30 attempts"
                  docker compose logs --tail=50 sqlflow
                  exit 1
                fi
                sleep 2
              done
            else
              # 直接 docker run 部署
              docker stop sqlflow 2>/dev/null || true
              docker rm sqlflow 2>/dev/null || true

              docker run -d \
                --name sqlflow \
                --restart unless-stopped \
                -p 8080:8080 \
                -v sqlflow-data:/app/data \
                --env-file /opt/sqlflow/.env \
                ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}

              # 等待健康检查
              echo "Waiting for health check..."
              for i in $(seq 1 30); do
                if curl -sf http://localhost:8080/api/health > /dev/null 2>&1; then
                  echo "Health check passed!"
                  break
                fi
                if [ "$i" -eq 30 ]; then
                  echo "::error::Health check failed after 30 attempts"
                  docker logs sqlflow --tail=50
                  exit 1
                fi
                sleep 2
              done
            fi

            # 清理旧镜像
            docker image prune -f

            echo "=== Deploy Complete ==="

      # ── 部署后验证 ──
      - name: Post-deploy health check
        if: success()
        run: |
          echo "## Deployment Summary :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Host:** \`${{ secrets.DEPLOY_HOST }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

      # ── 部署失败自动回滚 ──
      - name: Rollback on failure
        if: failure()
        run: |
          echo "::error::Deployment failed! Check logs above."
          echo "To rollback manually, re-run the previous working image tag."

  # ────────────────────────────────────────────────
  # 部署通知
  # ────────────────────────────────────────────────
  notify:
    name: Deploy Notification
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy]
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Send deployment notification
        run: |
          STATUS="${{ needs.deploy.result }}"
          if [ "$STATUS" = "success" ]; then
            EMOJI="✅"
            TITLE="Deploy Succeeded"
          elif [ "$STATUS" = "skipped" ]; then
            EMOJI="⏭️"
            TITLE="Deploy Skipped"
          else
            EMOJI="❌"
            TITLE="Deploy Failed"
          fi

          echo "## ${EMOJI} ${TITLE}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Actor:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_STEP_SUMMARY

          # 如果配置了钉钉 Webhook，发送通知
          if [ -n "${{ secrets.DINGTALK_WEBHOOK_URL }}" ]; then
            curl -sf -X POST "${{ secrets.DINGTALK_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d "{\"msgtype\":\"text\",\"text\":{\"content\":\"SQLFlow ${TITLE}\nCommit: ${{ github.sha }}\nBranch: ${{ github.ref_name }}\nActor: ${{ github.actor }}\"}}" || true
          fi
