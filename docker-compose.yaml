services:
  sqlflow:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - sqlflow-data:/app/data
    environment:
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}  # REQUIRED: set via .env file or env var
    restart: unless-stopped

volumes:
  sqlflow-data:
